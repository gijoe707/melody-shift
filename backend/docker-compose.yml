version: '3.8'

services:
  api:
    build: .
    environment:
      - REDIS_HOST=redis
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./oauth.json:/app/oauth.json
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
